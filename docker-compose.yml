services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-document-assistant-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_documents
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_documents"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
